# Minimal config for Supabase CLI migration management.
# We use a hosted Supabase project — this file is only needed so the CLI
# can discover the project and run `supabase db push` / `supabase db diff`.
#
# For full reference: https://supabase.com/docs/guides/local-development/cli/config

project_id = "ecomsaas"

[db]
major_version = 17

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]
